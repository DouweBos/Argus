appId: com.argus.app
productName: Argus
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"
  - node_modules/node-pty/**/*
extraResources:
  - from: native/argus-sim-bridge/argus-sim-bridge
    to: argus-sim-bridge
    filter:
      - "**/*"
  - from: native/scrcpy-server/scrcpy-server.jar
    to: scrcpy-server.jar
  - from: electron/prompts/worktree-agent-system-prompt.md
    to: worktree-agent-system-prompt.md
  - from: electron/prompts/root-agent-system-prompt.md
    to: root-agent-system-prompt.md
  - from: native/conductor
    to: conductor
    filter:
      - "**/*"
mac:
  identity: null
  target:
    - target: dir
      arch:
        - arm64
  category: public.app-category.developer-tools
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
asar: true
